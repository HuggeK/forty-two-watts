name: changeset-check

# Gate on PRs targeting master: require either a new .changeset/*.md
# file in the diff, or the `no-changeset` label on the PR (escape
# hatch for pure docs / CI / chore PRs that don't ship anything to
# users). The release workflow consumes those changesets — without
# this gate, ship-relevant PRs land on master with no entry in the
# next release's CHANGELOG.

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  changeset-required:
    name: changeset present (or no-changeset label)
    runs-on: ubuntu-latest
    steps:
      - name: Short-circuit on auto-generated Version PR
        # The "Version Packages" PR opened by changesets/action carries
        # the bumped package.json + rewritten CHANGELOG.md and DELETES
        # the consumed `.changeset/*.md` files — by design it contains
        # no new changeset, so this gate would otherwise block the
        # release PR forever and require manual `no-changeset`
        # labelling on every release.
        id: version_pr
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if [[ "${TITLE}" == "chore(release): version packages"* ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Auto-generated Version PR — gate skipped."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Short-circuit on no-changeset label
        # If the PR carries the explicit skip label, accept the PR
        # without checking for a changeset file. This is the escape
        # hatch for docs / CI / chore work — anything that genuinely
        # shouldn't contribute a CHANGELOG line.
        if: steps.version_pr.outputs.skip != 'true'
        id: label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          if echo "${LABELS}" | jq -e '.[] | select(.name == "no-changeset")' >/dev/null; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "PR carries 'no-changeset' label — release-notes gate satisfied."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.version_pr.outputs.skip != 'true' && steps.label.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          # Need both sides of the PR diff so we can ask git whether
          # the PR adds a `.changeset/*.md` file. fetch-depth: 0 is
          # the standard.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base ref
        if: steps.version_pr.outputs.skip != 'true' && steps.label.outputs.skip != 'true'
        # actions/checkout@v5 with fetch-depth: 0 fetches refs/remotes/
        # origin/* by default, but we double-check master is present
        # (fork PRs in particular can be missing some refs depending
        # on the checkout path) and fall back to fetching it.
        run: |
          set -euo pipefail
          if ! git rev-parse --verify origin/master >/dev/null 2>&1; then
            git fetch origin master --depth=1
          fi

      - name: Verify a changeset is present
        if: steps.version_pr.outputs.skip != 'true' && steps.label.outputs.skip != 'true'
        # Deterministic check via git instead of `changeset status` —
        # the CLI's exit-code contract for "no changesets" has shifted
        # across minor versions, so we don't want the gate's truthiness
        # to depend on which @changesets/cli we happened to install.
        # We just ask git: did the PR introduce a new file matching
        # `.changeset/*.md` (other than the README)?
        run: |
          set -euo pipefail
          # --diff-filter=A: only ADDED files (renames/mods don't count
          #   — a real changeset is always a new file).
          # `...HEAD` (three-dot): diff PR's head vs the merge base with
          #   master, so unrelated commits on master don't pollute the
          #   list.
          ADDED="$(git diff --name-only --diff-filter=A "origin/master...HEAD" -- '.changeset/*.md' | grep -v '^\.changeset/README\.md$' || true)"
          if [ -n "${ADDED}" ]; then
            echo "Changeset(s) detected:"
            echo "${ADDED}"
            exit 0
          fi
          cat <<'EOF' >&2

          ===============================================================
          No changeset detected on this PR.

          Add one with:

              npx changeset

          …and commit the generated .changeset/*.md file.

          If this PR genuinely doesn't need a release entry (docs-only,
          CI tweak, pure chore), add the "no-changeset" label to the PR
          instead.

          See .changeset/README.md for guidance.
          ===============================================================
          EOF
          exit 1
